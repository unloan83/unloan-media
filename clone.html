<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Purpose-Driven Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* Configuration Section */
        .config-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .config-section h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.3em;
        }

        .token-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .token-input-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
        }

        .token-input-group button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .token-input-group button:hover {
            background: #764ba2;
        }

        .repo-config-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 120px;
            gap: 12px;
            margin-bottom: 15px;
            align-items: end;
        }

        .repo-config-group input,
        .repo-config-group select {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
        }

        .repo-config-group button {
            padding: 12px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .repo-config-group button:hover {
            background: #218838;
        }

        .repo-list-container {
            margin-top: 20px;
        }

        .repo-item {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 100px;
            gap: 12px;
            align-items: center;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 6px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .repo-item-field {
            font-size: 0.9em;
        }

        .repo-item-label {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 2px;
            font-size: 0.75em;
            text-transform: uppercase;
        }

        .repo-item button {
            background: #dc3545;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background 0.3s;
        }

        .repo-item button:hover {
            background: #c82333;
        }

        /* Purpose Sections */
        .purpose-sections {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-bottom: 40px;
        }

        .purpose-section {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .purpose-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 25px;
            border-bottom: 4px solid #ffc107;
        }

        .purpose-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .purpose-description {
            font-size: 0.95em;
            opacity: 0.9;
        }

        .repos-in-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            padding: 25px;
        }

        /* Repo Cards */
        .repo-card {
            background: #f8f9fa;
            border-radius: 10px;
            border: 2px solid #e9ecef;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .repo-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.2);
        }

        .repo-card-header {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            padding: 15px;
            border-bottom: 1px solid #e9ecef;
        }

        .repo-card-name {
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .repo-card-name a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }

        .repo-card-name a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .repo-card-purpose {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 8px;
            font-style: italic;
        }

        .repo-card-stats {
            display: flex;
            gap: 12px;
            font-size: 0.8em;
            color: #999;
        }

        .repo-card-content {
            padding: 15px;
        }

        .repo-output {
            margin-bottom: 15px;
        }

        .output-title {
            font-size: 0.95em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #667eea;
        }

        .output-count {
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            margin-left: 5px;
        }

        .items-list {
            list-style: none;
        }

        .item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 0.9em;
        }

        .item:last-child {
            border-bottom: none;
        }

        .item-title {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        .item-title:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .item-meta {
            font-size: 0.8em;
            color: #999;
            margin-top: 3px;
        }

        .label {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7em;
            margin-right: 5px;
            margin-top: 3px;
        }

        .empty-state {
            color: #999;
            font-style: italic;
            padding: 10px 0;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: white;
            font-size: 1.2em;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .purpose-color-0 { border-left-color: #667eea; }
        .purpose-color-1 { border-left-color: #764ba2; }
        .purpose-color-2 { border-left-color: #f093fb; }
        .purpose-color-3 { border-left-color: #4facfe; }
        .purpose-color-4 { border-left-color: #43e97b; }
        .purpose-color-5 { border-left-color: #fa709a; }

        .purpose-header-0 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .purpose-header-1 { background: linear-gradient(135deg, #764ba2 0%, #f093fb 100%); }
        .purpose-header-2 { background: linear-gradient(135deg, #f093fb 0%, #4facfe 100%); }
        .purpose-header-3 { background: linear-gradient(135deg, #4facfe 0%, #43e97b 100%); }
        .purpose-header-4 { background: linear-gradient(135deg, #43e97b 0%, #fa709a 100%); }
        .purpose-header-5 { background: linear-gradient(135deg, #fa709a 0%, #667eea 100%); }

        @media (max-width: 768px) {
            .repo-config-group {
                grid-template-columns: 1fr;
            }

            .repo-item {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .repos-in-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 GitHub Purpose-Driven Portal</h1>
            <p>Monitor repositories organized by their purpose and objective</p>
        </header>

        <div class="config-section">
            <h2>⚙️ Configuration</h2>
            
            <div>
                <h3 style="margin-bottom: 10px; font-size: 1.1em;">GitHub Token</h3>
                <div class="token-input-group">
                    <input 
                        type="password" 
                        id="tokenInput" 
                        placeholder="Enter GitHub Personal Access Token (optional for public repos)"
                    >
                    <button onclick="saveToken()">Save Token</button>
                </div>
            </div>

            <div>
                <h3 style="margin-bottom: 10px; font-size: 1.1em;">Add Repository with Purpose</h3>
                <div class="repo-config-group">
                    <div>
                        <label style="display: block; font-size: 0.85em; color: #666; margin-bottom: 5px;">Repository (owner/name)</label>
                        <input 
                            type="text" 
                            id="repoInput" 
                            placeholder="e.g., facebook/react"
                        >
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.85em; color: #666; margin-bottom: 5px;">Purpose Category</label>
                        <input 
                            type="text" 
                            id="purposeInput" 
                            placeholder="e.g., Frontend Framework, API Server, etc."
                        >
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.85em; color: #666; margin-bottom: 5px;">Purpose Description</label>
                        <input 
                            type="text" 
                            id="descriptionInput" 
                            placeholder="What does this repo do?"
                        >
                    </div>
                    <div>
                        <label style="display: block; font-size: 0.85em; color: #666; margin-bottom: 5px;">Output Type</label>
                        <select id="outputTypeSelect">
                            <option value="all">Issues & PRs</option>
                            <option value="issues">Issues Only</option>
                            <option value="prs">PRs Only</option>
                            <option value="releases">Releases</option>
                        </select>
                    </div>
                    <button onclick="addRepo()">Add Repo</button>
                </div>
            </div>

            <div class="repo-list-container" id="repoListContainer" style="display: none;">
                <h3 style="margin-bottom: 15px; font-size: 1.1em;">Added Repositories</h3>
                <div id="repoList"></div>
            </div>
        </div>

        <div id="content">
            <div class="loading">
                <p>✨ Add repositories above to get started</p>
            </div>
        </div>
    </div>

    <script>
        let repos = [];
        let token = localStorage.getItem('gh_token') || '';

        // Purpose color mapping
        const purposeColors = [
            { name: 'Frontend', color: '#667eea' },
            { name: 'Backend', color: '#764ba2' },
            { name: 'Infrastructure', color: '#f093fb' },
            { name: 'API', color: '#4facfe' },
            { name: 'Database', color: '#43e97b' },
            { name: 'DevOps', color: '#fa709a' }
        ];

        // Save token
        function saveToken() {
            const input = document.getElementById('tokenInput');
            token = input.value;
            if (token) {
                localStorage.setItem('gh_token', token);
                alert('Token saved!');
                input.value = '';
            }
        }

        // Add repository
        function addRepo() {
            const repoInput = document.getElementById('repoInput');
            const purposeInput = document.getElementById('purposeInput');
            const descriptionInput = document.getElementById('descriptionInput');
            const outputTypeSelect = document.getElementById('outputTypeSelect');

            const repo = repoInput.value.trim();
            const purpose = purposeInput.value.trim();
            const description = descriptionInput.value.trim();
            const outputType = outputTypeSelect.value;

            if (!repo || !repo.includes('/')) {
                alert('Please enter repo in format: owner/name');
                return;
            }

            if (!purpose) {
                alert('Please enter a purpose category');
                return;
            }

            const repoObj = {
                repo,
                purpose,
                description,
                outputType,
                id: Date.now()
            };

            repos.push(repoObj);
            localStorage.setItem('gh_repos', JSON.stringify(repos));
            
            repoInput.value = '';
            purposeInput.value = '';
            descriptionInput.value = '';
            outputTypeSelect.value = 'all';

            updateRepoList();
            loadPortalData();
        }

        // Remove repository
        function removeRepo(id) {
            repos = repos.filter(r => r.id !== id);
            localStorage.setItem('gh_repos', JSON.stringify(repos));
            updateRepoList();
            loadPortalData();
        }

        // Update repo list display
        function updateRepoList() {
            const list = document.getElementById('repoList');
            const container = document.getElementById('repoListContainer');

            if (repos.length === 0) {
                container.style.display = 'none';
                return;
            }

            container.style.display = 'block';
            list.innerHTML = repos.map(r => `
                <div class="repo-item">
                    <div class="repo-item-field">
                        <div class="repo-item-label">Repository</div>
                        <div>${r.repo}</div>
                    </div>
                    <div class="repo-item-field">
                        <div class="repo-item-label">Purpose</div>
                        <div>${r.purpose}</div>
                    </div>
                    <div class="repo-item-field">
                        <div class="repo-item-label">Description</div>
                        <div style="color: #666; font-size: 0.85em;">${r.description || 'N/A'}</div>
                    </div>
                    <div class="repo-item-field">
                        <div class="repo-item-label">Output Type</div>
                        <div>${r.outputType}</div>
                    </div>
                    <button onclick="removeRepo(${r.id})">Remove</button>
                </div>
            `).join('');
        }

        // Fetch data from GitHub API
        async function fetchRepoData(owner, name, outputType) {
            const headers = {
                'Accept': 'application/vnd.github.v3+json',
            };

            if (token) {
                headers['Authorization'] = `token ${token}`;
            }

            try {
                const repoRes = await fetch(`https://api.github.com/repos/${owner}/${name}`, { headers });
                const repoData = await repoRes.json();

                let issues = [];
                let prs = [];
                let releases = [];

                if (outputType === 'all' || outputType === 'issues') {
                    const issuesRes = await fetch(
                        `https://api.github.com/repos/${owner}/${name}/issues?state=open&per_page=10`,
                        { headers }
                    );
                    issues = await issuesRes.json();
                    issues = issues.filter(i => !i.pull_request);
                }

                if (outputType === 'all' || outputType === 'prs') {
                    const prsRes = await fetch(
                        `https://api.github.com/repos/${owner}/${name}/pulls?state=open&per_page=10`,
                        { headers }
                    );
                    prs = await prsRes.json();
                }

                if (outputType === 'releases') {
                    const releasesRes = await fetch(
                        `https://api.github.com/repos/${owner}/${name}/releases?per_page=10`,
                        { headers }
                    );
                    releases = await releasesRes.json();
                }

                return {
                    repo: repoData,
                    issues,
                    prs,
                    releases
                };
            } catch (error) {
                console.error(`Error fetching ${owner}/${name}:`, error);
                return null;
            }
        }

        // Load all repo data
        async function loadPortalData() {
            if (repos.length === 0) {
                document.getElementById('content').innerHTML = `
                    <div class="loading">
                        <p>✨ Add repositories above to get started</p>
                    </div>
                `;
                return;
            }

            document.getElementById('content').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading data from ${repos.length} repository(ies)...</p>
                </div>
            `;

            const allData = await Promise.all(
                repos.map(async (repoObj) => {
                    const [owner, name] = repoObj.repo.split('/');
                    const data = await fetchRepoData(owner, name, repoObj.outputType);
                    return data ? { ...repoObj, data } : null;
                })
            );

            renderPortal(allData.filter(d => d !== null));
        }

        // Group repos by purpose
        function groupByPurpose(repos) {
            const grouped = {};
            repos.forEach(r => {
                if (!grouped[r.purpose]) {
                    grouped[r.purpose] = [];
                }
                grouped[r`*
