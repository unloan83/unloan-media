name: Daily Market Close CSV

on:
  schedule:
    - cron: "15 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  market-close-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Capture post-close gainers and losers
        run: node scripts/update_daily_recommendations.mjs --slot market-close

      - name: Commit CSV update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily market close CSV"
          file_pattern: data/daily_recommendations.csv
