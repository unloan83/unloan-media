<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Repository Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
            margin-bottom: 20px;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: grid;
            grid-template-columns: 1fr 1fr auto auto;
            gap: 15px;
            align-items: end;
        }

        .controls input {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
        }

        .controls button {
            padding: 12px 24px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .controls button:hover {
            background: #218838;
        }

        .refresh-btn {
            background: #667eea !important;
        }

        .refresh-btn:hover {
            background: #764ba2 !important;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .repo-section {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .repo-section:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .repo-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-bottom: 4px solid #ffc107;
        }

        .repo-name {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .repo-name a {
            color: white;
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .repo-name a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .repo-description {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .repo-stats {
            display: flex;
            gap: 15px;
            font-size: 0.85em;
            opacity: 0.8;
        }

        .repo-content {
            padding: 20px;
        }

        .output-section {
            margin-bottom: 20px;
        }

        .output-section:last-child {
            margin-bottom: 0;
        }

        .output-title {
            font-size: 1em;
            font-weight: bold;
            color: #333;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .output-count {
            background: #667eea;
            color: white;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.85em;
        }

        .items-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item {
            padding: 10px;
            background: #f8f9fa;
            border-left: 3px solid #667eea;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .item:hover {
            background: #eff1f7;
            border-left-color: #764ba2;
        }

        .item-title {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            display: block;
            margin-bottom: 4px;
            transition: color 0.3s;
        }

        .item-title:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .item-meta {
            font-size: 0.8em;
            color: #999;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .item-author {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .label {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7em;
            color: white;
        }

        .empty-state {
            color: #999;
            font-style: italic;
            padding: 15px;
            text-align: center;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .success {
            background: #51cf66;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .config-list {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .config-list h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .config-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 10px;
        }

        .config-item {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .config-item-name {
            font-weight: bold;
            color: #333;
        }

        .config-item-purpose {
            font-size: 0.85em;
            color: #666;
        }

        .remove-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: background 0.3s;
        }

        .remove-btn:hover {
            background: #c82333;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 GitHub Repository Portal</h1>
            <p>Monitor multiple repositories in a single dashboard</p>
        </header>

        <div class="controls">
            <div>
                <label style="display: block; font-size: 0.85em; color: #666; margin-bottom: 5px;">Repository (owner/name)</label>
                <input type="text" id="repoInput" placeholder="e.g., facebook/react">
            </div>
            <div>
                <label style="display: block; font-size: 0.85em; color: #666; margin-bottom: 5px;">Purpose/Category</label>
                <input type="text" id="purposeInput" placeholder="e.g., Frontend, Backend, etc.">
            </div>
            <button onclick="addRepository()">Add Repository</button>
            <button class="refresh-btn" onclick="refreshData()">🔄 Refresh All</button>
        </div>

        <div id="configList"></div>
        <div id="statusMessage"></div>
        <div id="dashboard"></div>
    </div>

    <script>
        let repositories = [];

        // Load repositories from localStorage
        function loadRepositories() {
            const saved = localStorage.getItem('portal_repos');
            if (saved) {
                repositories = JSON.parse(saved);
                displayConfigList();
                loadAllData();
            }
        }

        // Save repositories to localStorage
        function saveRepositories() {
            localStorage.setItem('portal_repos', JSON.stringify(repositories));
        }

        // Add repository
        function addRepository() {
            const repoInput = document.getElementById('repoInput');
            const purposeInput = document.getElementById('purposeInput');
            
            const repo = repoInput.value.trim();
            const purpose = purposeInput.value.trim() || 'Uncategorized';

            if (!repo || !repo.includes('/')) {
                showStatus('❌ Please enter repository in format: owner/name', 'error');
                return;
            }

            if (repositories.some(r => r.repo === repo)) {
                showStatus('⚠️ Repository already added!', 'error');
                return;
            }

            repositories.push({
                repo,
                purpose,
                id: Date.now()
            });

            saveRepositories();
            repoInput.value = '';
            purposeInput.value = '';
            
            displayConfigList();
            loadAllData();
            showStatus('✅ Repository added successfully!', 'success');
        }

        // Remove repository
        function removeRepository(id) {
            repositories = repositories.filter(r => r.id !== id);
            saveRepositories();
            displayConfigList();
            loadAllData();
            showStatus('✅ Repository removed!', 'success');
        }

        // Display config list
        function displayConfigList() {
            const configList = document.getElementById('configList');
            
            if (repositories.length === 0) {
                configList.innerHTML = '';
                return;
            }

            const grouped = {};
            repositories.forEach(r => {
                if (!grouped[r.purpose]) grouped[r.purpose] = [];
                grouped[r.purpose].push(r);
            });

            let html = '<div class="config-list"><h3>📋 Configured Repositories</h3><div class="config-items">';
            
            Object.entries(grouped).forEach(([purpose, repos]) => {
                repos.forEach(r => {
                    html += `
                        <div class="config-item">
                            <div>
                                <div class="config-item-name">${r.repo}</div>
                                <div class="config-item-purpose">${purpose}</div>
                            </div>
                            <button class="remove-btn" onclick="removeRepository(${r.id})">×</button>
                        </div>
                    `;
                });
            });

            html += '</div></div>';
            configList.innerHTML = html;
        }

        // Show status message
        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => {
                statusDiv.innerHTML = '';
            }, 3000);
        }

        // Fetch repository data
        async function fetchRepoData(repo) {
            try {
                const [owner, name] = repo.split('/');
                
                // Fetch repo info
                const repoRes = await fetch(`https://api.github.com/repos/${owner}/${name}`);
                const repoData = await repoRes.json();

                if (repoData.message === 'Not Found') {
                    return null;
                }

                // Fetch open issues
                const issuesRes = await fetch(
                    `https://api.github.com/repos/${owner}/${name}/issues?state=open&per_page=8`
                );
                const issues = await issuesRes.json();

                // Fetch open PRs
                const prsRes = await fetch(
                    `https://api.github.com/repos/${owner}/${name}/pulls?state=open&per_page=8`
                );
                const prs = await prsRes.json();

                // Fetch releases
                const releasesRes = await fetch(
                    `https://api.github.com/repos/${owner}/${name}/releases?per_page=5`
                );
                const releases = await releasesRes.json();

                return {
                    repo: repoData,
                    issues: issues.filter(i => !i.pull_request),
                    prs: prs,
                    releases: releases || []
                };
            } catch (error) {
                console.error(`Error fetching ${repo}:`, error);
                return null;
            }
        }

        // Load all data
        async function loadAllData() {
            if (repositories.length === 0) {
                document.getElementById('dashboard').innerHTML = `
                    <div style="grid-column: 1/-1;">
                        <div class="loading">
                            <p style="font-size: 1.2em;">👆 Add repositories above to get started</p>
                        </div>
                    </div>
                `;
                return;
            }

            document.getElementById('dashboard').innerHTML = `
                <div style="grid-column: 1/-1;">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Loading data from ${repositories.length} repository(ies)...</p>
                    </div>
                </div>
            `;

            const allData = await Promise.all(
                repositories.map(async (repoObj) => {
                    const data = await fetchRepoData(repoObj.repo);
                    return data ? { ...repoObj, ...data } : null;
                })
            );

            renderDashboard(allData.filter(d => d !== null));
        }

        // Render dashboard
        function renderDashboard(data) {
            const dashboard = document.getElementById('dashboard');

            if (data.length === 0) {
                dashboard.innerHTML = '<div style="grid-column: 1/-1;"><div class="error">❌ Error loading repository data. Check repo names and try again.</div></div>';
                return;
            }

            dashboard.innerHTML = `
                <div style="grid-column: 1/-1; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px;">
                    ${data.map(repoData => createRepoCard(repoData)).join('')}
                </div>
            `;
        }

        // Create repo card
        function createRepoCard(repoData) {
            const { repo, issues, prs, releases, purpose } = repoData;

            return `
                <div class="repo-section">
                    <div class="repo-header">
                        <div class="repo-name">
                            <a href="${repo.html_url}" target="_blank">📦 ${repo.full_name}</a>
                        </div>
                        <div class="repo-description">${repo.description || 'No description'}</div>
                        <div class="repo-stats">
                            <span>⭐ ${repo.stargazers_count.toLocaleString()}</span>
                            <span>🔀 ${repo.forks_count.toLocaleString()}</span>
                            <span>👁️ ${repo.watchers_count.toLocaleString()}</span>
                            <span>🏷️ ${purpose}</span>
                        </div>
                    </div>
                    <div class="repo-content">
                        ${createOutputSection('📋 Issues', issues, 'issue')}
                        ${createOutputSection('🔄 Pull Requests', prs, 'pr')}
                        ${createOutputSection('🚀 Releases', releases, 'release')}
                    </div>
                </div>
            `;
        }

        // Create output section
        function createOutputSection(title, items, type) {
            if (items.length === 0) {
                return `
                    <div class="output-section">
                        <div class="output-title">
                            ${title}
                            <span class="output-count">0</span>
                        </div>
                        <div class="empty-state">No ${title.toLowerCase()}</div>
                    </div>
                `;
            }

            return `
                <div class="output-section">
                    <div class="output-title">
                        ${title}
                        <span class="output-count">${items.length}</span>
                    </div>
                    <ul class="items-list">
                        ${items.map(item => createItemElement(item, type)).join('')}
                    </ul>
                </div>
            `;
        }

        // Create item element
        function createItemElement(item, type) {
            let title, url, author, date, labels = [];

            if (type === 'issue' || type === 'pr') {
                title = `#${item.number}: ${item.title}`;
                url = item.html_url;
                author = item.user.login;
                date = new Date(item.created_at).toLocaleDateString();
                if (item.labels) labels = item.labels;
            } else if (type === 'release') {
                title = item.tag_name;
                url = item.html_url;
                author = item.author.login;
                date = new Date(item.published_at).toLocaleDateString();
            }

            const labelsHtml = labels.map(l => 
                `<span class="label" style="background: #${l.color}; color: ${getTextColor(l.color)}">${l.name}</span>`
            ).join('');

            return `
                <li class="item">
                    <a href="${url}" target="_blank" class="item-title">${title}</a>
                    <div class="item-meta">
                        <span class="item-author">👤 ${author}</span>
                        <span>📅 ${date}</span>
                        ${labelsHtml}
                    </div>
                </li>
            `;
        }

        // Get readable text color
        function getTextColor(hexColor) {
            const r = parseInt(hexColor.substr(0, 2), 16);
            const g = parseInt(hexColor.substr(2, 2), 16);
            const b = parseInt(hexColor.substr(4, 2), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            return brightness > 128 ? '#000' : '#fff';
        }

        // Refresh data
        function refreshData() {
            if (repositories.length === 0) {
                showStatus('⚠️ No repositories configured', 'error');
                return;
            }
            loadAllData();
        }

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', loadRepositories);
    </script>
</body>
</html>
